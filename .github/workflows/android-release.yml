name: Signed Android release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name, for example 1.2.0
        required: false
        type: string
      version_code:
        description: Positive Play version code; defaults to the run number
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4

      - name: Validate signing credentials
        shell: bash
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "ANDROID_KEYSTORE_BASE64 is missing"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "ANDROID_KEYSTORE_PASSWORD is missing"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "ANDROID_KEY_ALIAS is missing"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "ANDROID_KEY_PASSWORD is missing"; exit 1; }

      - name: Prepare version and keystore
        shell: bash
        env:
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
          INPUT_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="${INPUT_VERSION_NAME:-0.0.${GITHUB_RUN_NUMBER}}"
          fi
          VERSION_CODE="${INPUT_VERSION_CODE:-$GITHUB_RUN_NUMBER}"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Release lint and unit tests
        run: ./gradlew --no-daemon lintRelease testReleaseUnitTest

      - name: Build signed APK and AAB
        run: ./gradlew --no-daemon assembleRelease bundleRelease

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: used-phone-inspector-${{ env.VERSION_NAME }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

      - name: Delete temporary signing material
        if: always()
        shell: bash
        run: rm -f "$RUNNER_TEMP/release.jks"
