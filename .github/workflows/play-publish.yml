name: Publish to Google Play

on:
  workflow_dispatch:
    inputs:
      track:
        description: Google Play track
        required: true
        default: internal
        type: choice
        options: [internal, alpha, beta, production]
      release_status:
        description: Play release status
        required: true
        default: draft
        type: choice
        options: [draft, inProgress, completed]
      version_name:
        description: Version name
        required: false
        type: string
      version_code:
        description: Version code; defaults to run number
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: google-play
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4

      - name: Validate Play and signing credentials
        shell: bash
        run: |
          test -n "$PLAY_SERVICE_ACCOUNT_JSON" || { echo "PLAY_SERVICE_ACCOUNT_JSON is missing"; exit 1; }
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "ANDROID_KEYSTORE_BASE64 is missing"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "ANDROID_KEYSTORE_PASSWORD is missing"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "ANDROID_KEY_ALIAS is missing"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "ANDROID_KEY_PASSWORD is missing"; exit 1; }

      - name: Prepare signed build
        shell: bash
        env:
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
          INPUT_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          echo "VERSION_NAME=${INPUT_VERSION_NAME:-0.0.${GITHUB_RUN_NUMBER}}" >> "$GITHUB_ENV"
          echo "VERSION_CODE=${INPUT_VERSION_CODE:-$GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Test and build signed AAB
        run: ./gradlew --no-daemon lintRelease testReleaseUnitTest bundleRelease

      - name: Publish selected track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shahriarhasan.usedphoneinspector
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ inputs.track }}
          status: ${{ inputs.release_status }}
          whatsNewDirectory: docs/release-notes

      - name: Upload published AAB
        uses: actions/upload-artifact@v4
        with:
          name: play-${{ inputs.track }}-${{ env.VERSION_NAME }}
          path: app/build/outputs/bundle/release/*.aab

      - name: Delete temporary credentials
        if: always()
        shell: bash
        run: rm -f "$RUNNER_TEMP/release.jks"
